name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DATABASE_URL: "postgresql://dummy:dummy@127.0.0.1:5432/dummy?schema=public"
      BETTER_AUTH_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      BETTER_AUTH_URL: "http://127.0.0.1:3000"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: prisma generate
        run: pnpm prisma generate

      - name: Build
        run: pnpm build

      - name: Prepare standalone
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          cp ecosystem.config.js .next/standalone/
          cp package.json .next/standalone/
          if [ -f package-lock.json ]; then cp package-lock.json .next/standalone/; fi
          if [ -f pnpm-lock.yaml ]; then cp pnpm-lock.yaml .next/standalone/; fi

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared version

      - name: Configure SSH via Cloudflared
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          cat > ~/.ssh/config << EOF
          Host deploy-prod
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            Port 7022
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 3
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

          chmod 600 ~/.ssh/config

      - name: Sync build to server
        run: |
          rsync -az --delete \
            --exclude='.env*' \
            --exclude='*.log' \
            -e "ssh" \
            .next/standalone/ \
            deploy-prod:/srv/www/portofolio/

      - name: Reload PM2
        run: |
          ssh deploy-prod << 'ENDSSH'
          set -e

          # MUAT NVM SECARA MANUAL
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Sekarang sistem sudah kenal 'node' dan 'pm2' secara otomatis
          cd /srv/www/portofolio
          mkdir -p logs
          pnpm rebuild argon2 --build-from-source

          if pm2 describe portofolio >/dev/null 2>&1; then
            pm2 reload ecosystem.config.js --update-env --env production
          else
            pm2 start ecosystem.config.js --env production
          fi

          pm2 save
          ENDSSH
